name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - master
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci && npm run build
      # Deploy with the Firebase CLI directly. The previous FirebaseExtended/action-hosting-deploy@v0
      # retried its release call on transient network errors, then 400'd with FAILED_PRECONDITION
      # ("is the current active version") because the first attempt had already succeeded — marking
      # otherwise-good deploys as failed. The CLI deploy does not have that retry bug.
      - name: Deploy to Firebase Hosting
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SCHOLARLY_ECHO }}
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/firebase-sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/firebase-sa.json"
          npx --yes firebase-tools@latest deploy --only hosting --project scholarly-echo --non-interactive
          rm -f "$RUNNER_TEMP/firebase-sa.json"
